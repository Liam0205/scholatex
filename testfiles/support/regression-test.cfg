% regression-test.cfg -- shared test scaffolding for scholatex .lvt files.
%
% l3build copies the contents of testfiles/support/ into the test
% working directory and \InputIfFileExists{regression-test.cfg} after
% the harness is loaded but before \documentclass{scholatex}.
%
% scholatex.cls's \AtBeginDocument hook re-reads the source and may
% raise tex.error -- which aborts later \AtBeginDocument hooks. If we
% deferred \START to that hook, the marker would never emit on failing
% tests and l3build would discard the whole transcript (everything
% before START-TEST-LOG is treated as preamble noise).
%
% Fire \START synchronously at cfg load time so it lands BEFORE the
% \documentclass line and unconditionally precedes any scholatex
% error. \END remains driven by \let\end\END from regression-test.tex,
% triggered by the literal \end{document} that scholatex's hook emits.
%
% No \OMIT / \TIMO bracketing: the build.lua-side whitelist filter
% already drops every line that isn't scholatex output or a PIN: line,
% so LaTeX's preamble noise (font-defaults / supp-pdf / geometry
% verbose / pgfplots compat) is filtered out post-hoc regardless of
% where it lands in the START/END window.

\START
\def\AUTHOR#1{}
