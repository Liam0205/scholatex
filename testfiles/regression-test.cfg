% regression-test.cfg -- shared test scaffolding for scholatex .lvt files.
%
% l3build's regression-test.tex \input's this file when present in the
% test working directory. It runs after the harness is loaded but before
% \documentclass{scholatex}.
%
% scholatex.cls is a closed-language class: its \AtBeginDocument hook
% reads the document body itself and injects transpiled output. The
% regression harness needs:
%   \START  to be called once -- emit "START-TEST-LOG" marker
%   \END    to be called once -- emit "END-TEST-LOG" marker
%
% scholatex.cls already emits a literal \end{document} at the end of its
% hook, which the harness has \let\end\END'ed so \END runs automatically.
% We just need \START to fire automatically too, since the example body
% does not call it.

\AtBeginDocument{\START}
\let\wlog\@gobble
\def\AUTHOR#1{}
