% regression-test.cfg -- shared test scaffolding for scholatex .lvt files.
%
% l3build's regression-test.tex \input's this file when present in the
% test working directory. It runs after the harness is loaded but before
% \documentclass{scholatex}.
%
% scholatex.cls's \AtBeginDocument hook re-reads the source and may
% raise tex.error -- which aborts later \AtBeginDocument hooks. If we
% deferred \START to \AtBeginDocument, the marker would never emit on
% failing tests and l3build would discard the whole transcript
% (everything before START-TEST-LOG is treated as preamble noise).
%
% Fire \START synchronously at cfg load time so it lands BEFORE the
% \documentclass line and unconditionally precedes any scholatex
% error. \END remains driven by \let\end\END from regression-test.tex,
% triggered by the literal \end{document} that scholatex's hook emits.

\START
\OMIT
% LaTeX's own \begin{document} sequence prints a flurry of "Font Info"
% / supp-pdf / geometry verbose lines that have nothing to do with what
% scholatex does. Suppress them by extending the OMIT zone to cover the
% whole begindocument hook chain: we resume capture (\TIMO) only inside
% scholatex.cls's transpile path, then re-OMIT once it has emitted.
%
% Concretely: scholatex.cls registers an \AtBeginDocument hook that does
%   directlua{ ... scholatex.inject(body) ... }
%   \end{document}
% i.e. it re-reads the source and emits a literal \end{document} to
% terminate LaTeX's own scan. We add a 'voss' rule so our top-level
% \TIMO fires immediately before scholatex's directlua call, and a final
% \OMIT closes the window. The hook names are LaTeX2e's standard.
\AddToHook{begindocument}[scholatex-test/timo]{\TIMO}
\AddToHook{begindocument/end}[scholatex-test/omit]{\OMIT}
% scholatex.cls's existing \AtBeginDocument lives in the default hook,
% so the relative ordering inside that hook is:
%   1. \TIMO            (label scholatex-test/timo, before scholatex)
%   2. scholatex.inject (the cls's own block in the default label)
%   ... at which point control transfers via \end{document} ...
% This gives a tight, scholatex-only window in the baseline.
\DeclareHookRule{begindocument}{scholatex-test/timo}{before}{.}
\DeclareHookRule{begindocument/end}{scholatex-test/omit}{after}{.}
\def\AUTHOR#1{}
